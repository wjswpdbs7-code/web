<!DOCTYPE html> <!-- 이 문서는 HTML5 문서임을 알려줍니다 -->

<style>
    /* ====================================================
           💡 색상 테마 설정 (여기서 색상만 바꾸면 전체 분위기가 바뀝니다!)
           ==================================================== */
    :root {
        /* 플레이어 1 (왼쪽/위쪽) 전용 테마 색상 */
        --p1-bg-start: #ff7e5f;
        /* 배경 그라데이션 시작 색상 */
        --p1-bg-end: #feb47b;
        /* 배경 그라데이션 끝 색상 */
        --p1-ripple: rgba(255, 255, 255, 0.6);
        /* 터치 물결 색상 */

        /* 플레이어 2 (오른쪽/아래쪽) 전용 테마 색상 */
        --p2-bg-start: #00c6ff;
        /* 배경 그라데이션 시작 색상 */
        --p2-bg-end: #0072ff;
        /* 배경 그라데이션 끝 색상 */
        --p2-ripple: rgba(255, 255, 255, 0.6);
        /* 터치 물결 색상 */

        /* 공통 중앙선 색상 */
        --divider-color: rgba(255, 255, 255, 0.3);
    }

    /* ---------------------------------------------------
           기본 뼈대 설정
           --------------------------------------------------- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        color: #ffffff;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background-color: #333;
        /* 창 밖의 기본 바탕색 */
    }

    /* 메인 전체 틀 */
    .battle-container {
        display: flex;
        width: 100%;
        height: 100%;
        max-width: 1200px;
        position: relative;
    }

    /* ---------------------------------------------------
           🔴 플레이어 1 (독립 컨테이너) 세팅
           --------------------------------------------------- */
    #player1-zone {
        flex: 1;
        /* 화면 절반 차지 */
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, var(--p1-bg-start), var(--p1-bg-end));
        /* 테마 색상 적용 */
    }

    #player1-zone .player-info {
        position: absolute;
        top: 5%;
        /* 제일 위쪽 */
        left: 10%;
        /* 왼쪽 가장자리로 밀착 */
        display: flex;
        align-items: center;
        gap: 15px;
        width: 80%;
        justify-content: flex-start;
        /* [이미지] - [이름] 순서 */
        padding: 10px 20px;
        background-color: rgba(255, 255, 255, 0.15);
        /* 반투명 캡슐 */
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    #player1-zone .ripple {
        border: 2px solid var(--p1-ripple);
        /* 테마 물결 색 적용 */
    }

    /* ---------------------------------------------------
           🔵 플레이어 2 (독립 컨테이너) 세팅
           --------------------------------------------------- */
    #player2-zone {
        flex: 1;
        /* 화면 절반 차지 */
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, var(--p2-bg-start), var(--p2-bg-end));
        /* 테마 색상 적용 */
    }

    #player2-zone .player-info {
        position: absolute;
        top: 5%;
        right: 10%;
        /* 오른쪽 가장자리로 밀착 */
        display: flex;
        align-items: center;
        gap: 15px;
        width: 80%;
        justify-content: flex-end;
        /* 오른쪽 정렬 (데칼코마니 방식) */
        flex-direction: row;
        /* 기존 순서 유지 */
        padding: 10px 20px;
        background-color: rgba(255, 255, 255, 0.15);
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    #player2-zone .ripple {
        border: 2px solid var(--p2-ripple);
        /* 테마 물결 색 적용 */
    }

    /* ---------------------------------------------------
           공통 디자인 (프로필 사진, 점수 등)
           --------------------------------------------------- */
    .profile-img {
        width: clamp(50px, 8vw, 80px);
        height: clamp(50px, 8vw, 80px);
        border-radius: 50%;
        background-color: #f1f1f1;
        border: 2px solid rgba(255, 255, 255, 0.9);
        object-fit: cover;
        /* 사진이 찌그러지지 않게 꽉 채움 */
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        /* 사진에 약간의 입체감 */
    }

    .player-name {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        /* 폰트 크기를 픽셀로 한게 아니라 뷰포트 너비에 따라 조절 모바일에서는 문제  */
        font-weight: 600;
    }

    .score {
        font-size: clamp(4rem, 12vw, 9rem);
        font-weight: 800;
        line-height: 1;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        z-index: 5;
    }

    .deco-icon {
        position: absolute;
        font-size: clamp(3rem, 8vw, 6rem);
        opacity: 0.15;
        top: 50%;
    }

    #player1-zone .deco-icon {
        left: 10%;
        transform: translateY(-50%) rotate(-30deg);
    }

    #player2-zone .deco-icon {
        right: 10%;
        transform: translateY(-50%) rotate(30deg);
    }

    /* 터치(물결) 애니메이션 설정 */
    .tap-area {
        position: absolute;
        bottom: 15%;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100px;
        height: 100px;
    }

    .ripple {
        position: absolute;
        border-radius: 50%;
        opacity: 0.8;
        animation: ripple-anim 2s infinite ease-out;
    }

    .ripple:nth-child(1) {
        width: 30px;
        height: 30px;
        animation-delay: 0s;
    }

    .ripple:nth-child(2) {
        width: 60px;
        height: 60px;
        animation-delay: 0.5s;
        opacity: 0.5;
    }

    .ripple:nth-child(3) {
        width: 90px;
        height: 90px;
        animation-delay: 1s;
        opacity: 0.2;
    }

    @keyframes ripple-anim {
        0% {
            transform: scale(0.5);
            opacity: 1;
        }

        100% {
            transform: scale(2);
            opacity: 0;
        }
    }

    /* ---------------------------------------------------
           경계선 및 VS 로고 배치
           --------------------------------------------------- */
    .divider {
        position: absolute;
        left: 50%;
        top: 0;
        height: 100%;
        width: 2px;
        background-color: var(--divider-color);
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }

    .divider .vs {
        font-size: 3rem;
        font-weight: bold;
        background-color: transparent;
        /* 배경 투명하게 */
        padding: 10px 20px;
        color: #ffffff;
        text-transform: lowercase;
        text-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        /* VS가 더 잘 보이게 그림자 강화 */
        font-style: italic;
    }

    /* ====================================================
           📱 스마트폰 세로 모드 대응 (미디어 쿼리)
           ==================================================== */
    @media screen and (max-aspect-ratio: 1/1) {
        .battle-container {
            flex-direction: column;
            /* 세로로 쌓기 */
        }

        .divider {
            width: 100%;
            height: 2px;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        /* 위쪽 플레이어(Player 1) 프로필 */
        #player1-zone .player-info {
            top: 5%;
            left: 10%;
            width: 80%;
            justify-content: flex-start;
        }

        /* 아래쪽 플레이어(Player 2) 프로필 (제일 바닥으로 밀침) */
        #player2-zone .player-info {
            top: auto;
            bottom: 5%;
            /* 바닥에 딱 붙이기 */
            left: 10%;
            right: auto;
            width: 80%;
            justify-content: flex-start;
            /* 프로필 이미지가 왼쪽오게 */
            flex-direction: row-reverse;
            /* [이미지]-[이름] 순서 만들기 */
        }

        /* 위쪽 플레이어(Player 1) 물결 (중간 선 바로 위) */
        #player1-zone .tap-area {
            bottom: 10%;
        }

        /* 아래쪽 플레이어(Player 2) 물결 (중간 선 바로 아래) */
        #player2-zone .tap-area {
            bottom: auto;
            top: 10%;
        }

        .deco-icon {
            display: none;
        }

        /* 장식 끄기 */
    }
</style>
<title>Badminton Game</title>
</head>

<body>

    <div class="battle-container">

        <div id="player1-zone">
            <div class="player-info">
                <img src="img/player1.JPG" alt="Player 1 Profile" class="profile-img">
                <div class="player-name">player1</div>
            </div>

            <div class="score">0</div>
            <div class="deco-icon">🏸</div>

            <div class="tap-area">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
            </div>
        </div>

        <div class="divider">
            <div class="vs">vs</div>
        </div>

        <div id="player2-zone">
            <div class="player-info">
                <div class="player-name">player2</div>
                <img src="img/player2.JPG" alt="Player 2 Profile" class="profile-img">
            </div>

            <div class="score">0</div>
            <div class="deco-icon">🏸</div>

            <div class="tap-area">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
            </div>
        </div>

    </div>


    <script>
        // 1. 점수 초기화 (0점부터 시작)
        let score1 = 0;
        let score2 = 0;

        // 2. 점수를 표시할 HTML 요소와 클릭할 영역 요소 가져오기
        const score1Display = document.querySelector('#player1-zone .score');
        const score2Display = document.querySelector('#player2-zone .score');
        const zone1 = document.getElementById('player1-zone');
        const zone2 = document.getElementById('player2-zone');

        // 3. 점수 체크 및 승부/듀스 판정 함수
        function checkWin() {
            // 화면에 점수가 먼저 바뀐 뒤에 알림창이 뜨도록 아주 살짝(50ms) 시간을 지연시킴
            setTimeout(() => {
                // [골든 포인트] 듀스가 길어져 30점에 먼저 도달하면 무조건 승리
                if (score1 === 30) {
                    alert("player1 승리! 🎉 (30점 도달)");
                    resetGame();
                    return;
                } else if (score2 === 30) {
                    alert("player2 승리! 🎉 (30점 도달)");
                    resetGame();
                    return;
                }

                // [일반/듀스 룰] 21점 이상 도달 & 점수 차이 2점 이상 날 때 승리
                if (score1 >= 21 && (score1 - score2) >= 2) {
                    alert("player1 승리! 🎉");
                    resetGame();
                } else if (score2 >= 21 && (score2 - score1) >= 2) {
                    alert("player2 승리! 🎉");
                    resetGame();
                }
            }, 50);
        }

        // 4. 게임 리셋(초기화) 함수
        function resetGame() {
            score1 = 0;
            score2 = 0;
            score1Display.innerText = score1;
            score2Display.innerText = score2;
        }

        // 5. 각 구역 클릭(터치) 시 점수 증가 이벤트 연결
        zone1.addEventListener('click', () => {
            score1++;
            score1Display.innerText = score1;
            checkWin(); // 점수 올린 뒤 승리했는지 검사
        });

        zone2.addEventListener('click', () => {
            score2++;
            score2Display.innerText = score2;
            checkWin(); // 점수 올린 뒤 승리했는지 검사
        });
    </script>

</body>

</html>
