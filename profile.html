<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배드민턴 매칭 - 프로필 열람</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            text-align: center;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            background-color: #eee;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            border: 3px solid #ff6600;
            font-size: 3rem;
            color: #aaa;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-size: 1.8rem;
            color: #333;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .user-id {
            color: #888;
            font-size: 1rem;
        }

        .info-section {
            margin-bottom: 30px;
        }

        .info-section-title {
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #ff6600;
            padding-bottom: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .info-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            flex: 1 1 calc(50% - 15px);
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .info-item.full-width {
            flex: 1 1 100%;
        }

        .info-label {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            color: #333;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #ff6600;
            color: white;
        }

        .btn-primary:hover {
            background-color: #e65c00;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #ccc;
        }

        @media (max-width: 600px) {
            .profile-container {
                padding: 25px 20px;
            }

            .info-item {
                flex: 1 1 100%;
            }

            .action-buttons {
                flex-direction: column-reverse;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- 프로필 헤더 (아바타 및 닉네임) -->
        <div class="profile-header">
            <div class="avatar-circle">
                👤
            </div>
            <h1 class="user-name">스매시장인</h1>
            <p class="user-id">@badminton_lover</p>
        </div>

        <!-- 플레이어 상세 정보 -->
        <div class="info-section">
            <div class="info-section-title">플레이어 정보</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">성별</div>
                    <div class="info-value">남성</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">나이대</div>
                    <div class="info-value">20대</div>
                </div>

                <div class="info-item">
                    <div class="info-label">주사용 손</div>
                    <div class="info-value">오른손</div>
                </div>

                <div class="info-item">
                    <div class="info-label">자체 급수</div>
                    <div class="info-value">D조</div>
                </div>

                <div class="info-item full-width">
                    <div class="info-label">주 활동 지역</div>
                    <div class="info-value">서울시 강남구</div>
                </div>
            </div>
        </div>

        <!-- 하단 액션 버튼 -->
        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="history.back();">목록으로</button>
            <button class="btn btn-primary" onclick="alert('매칭을 요청했습니다!');">매칭 요청하기</button>
        </div>
    </div>

</body>
</html>
