<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Screen</title>

    <style>
        body {
            background-color: rgb(255, 120, 31);
            background: radial-gradient(circle, rgb(255, 190, 31, 1) 0%, rgba(255, 120, 31, 1) 100%);
        }

        .info_container {
            display: flex;
            /* 플렉스 컨테이너로 설정 */
            justify-content: space-between;
            /* 자식 요소들을 양쪽 끝으로 정렬 */
            align-items: center;
            margin: 30px;

        }

        .score_container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px;
            width: 100%;
        }

        .score_container .player1_score,
        .score_container .player2_score {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        vs {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .player1_info img,
        .player2_info img {
            border-radius: 50%;
            object-fit: cover;
        }

        .score {
            margin: 200px;
            font-size: 200px;
            font-weight: bold;
            color: white;
        }


        @media (max-width: 800px) {
            .info_container {
                flex-direction: column;
                /* 수직 정렬로 변경 */
            }

            .score_container {
                flex-direction: column;
                /* 수직 정렬로 변경 */
            }

            .score {
                margin: 50px;
                font-size: 100px;
                /* 점수 폰트 크기 조정 */
            }
        }
    </style>
</head>

<body>

    <!-- 1 번 배드맨턴 플레이어 왼쪽 배치 
    
    2 번 배드맨턴 플레이어 오른쪽 배치 -->
    <div class="info_container">

        <div class="player1_info">
            <h1>Player 1</h1>
            <img src="img/player1.JPG" alt="db에서 받아온 1p 이미지" width="200" height="200">
        </div>

        <div class="player2_info">
            <h1>Player 2</h1>
            <img src="img/player2.JPG" alt="db에서 받아온 2p 이미지" width="200" height="200">
        </div>
    </div>
    <div class="score_container">
        <div class="player1_score">
            <h2 class="score">0</h2>
        </div>

        <div class="player2_score">
            <h2 class="score">0</h2>
        </div>
    </div>
</body>

</html>
