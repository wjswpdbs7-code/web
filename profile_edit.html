<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배드민턴 매칭 - 내 프로필</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 700px; /* 폼이 두 단으로 나뉠 수 있도록 넓이를 확장 */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-header h1 {
            color: #ff6600;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .profile-header p {
            color: #666;
            font-size: 0.95rem;
        }

        /* 프로필 상단 아바타 섹션 (Flexbox) */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            background-color: #eee;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            border: 3px solid #ff6600;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-section .btn-upload {
            padding: 8px 16px;
            background-color: #fff;
            color: #ff6600;
            border: 1px solid #ff6600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .avatar-section .btn-upload:hover {
            background-color: #ff6600;
            color: #fff;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section-title {
            font-size: 1.1rem;
            color: #333;
            border-bottom: 2px solid #ff6600;
            padding-bottom: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Flexbox 반응형 그리드 래퍼 */
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .form-group {
            /* 기본적으로 50% 폭 (간격 제외)을 차지하도록 설정, 축소/확대 가능 */
            flex: 1 1 calc(50% - 15px);
            display: flex;
            flex-direction: column;
        }

        /* 100% 폭을 차지해야 하는 요소 (예: 주소 등) */
        .form-group.full-width {
            flex: 1 1 100%;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #ff6600;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            height: 100%;
            align-items: center; /* 수직 중앙 정렬 */
            padding: 12px 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #555;
        }

        /* 하단 버튼 래퍼 (Flexbox) */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
        }

        .btn-primary {
            background-color: #ff6600;
            color: white;
        }

        .btn-primary:hover {
            background-color: #e65c00;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #ccc;
        }

        /* 모바일/테블릿 대응 반응형 디자인 */
        @media (max-width: 600px) {
            .profile-container {
                padding: 25px 20px;
            }

            .form-group {
                /* 모바일 환경에서는 한 줄에 하나씩 풀사이즈로 배치 */
                flex: 1 1 100%;
            }

            .action-buttons {
                flex-direction: column-reverse; /* 모바일엔 취소가 아래로, 저장이 위로 가도록 설정 */
            }
        }
    </style>
</head>

<body>

    <div class="profile-container">
        <div class="profile-header">
            <h1>내 프로필</h1>
            <p>나의 배드민턴 플레이어 정보를 관리하세요.</p>
        </div>

        <form action="#" method="POST" onsubmit="alert('프로필 정보가 수정되었습니다!'); return false;">
            
            <!-- 아바타 섹션 -->
            <div class="avatar-section">
                <div class="avatar-circle">
                    <!-- 기본 프로필 이미지 예시 -->
                    <span style="color:#aaa; font-size:2rem;">👤</span>
                </div>
                <input type="file" id="profilePicInput" style="display:none;" accept="image/*">
                <button type="button" class="btn-upload" onclick="document.getElementById('profilePicInput').click();">
                    사진 변경
                </button>
            </div>

            <!-- 로그인 및 기본 정보 섹션 -->
            <div class="form-section">
                <div class="form-section-title">계정 및 기본 정보</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="userId">아이디 (변경 불가)</label>
                        <input type="text" id="userId" class="form-control" value="badminton_lover" disabled style="background-color: #f7f9fc; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label for="userName">이름(닉네임)</label>
                        <input type="text" id="userName" class="form-control" value="스매시장인" required>
                    </div>

                    <div class="form-group">
                        <label for="userPw">새 비밀번호</label>
                        <input type="password" id="userPw" class="form-control" placeholder="변경할 경우에만 입력">
                    </div>

                    <div class="form-group">
                        <label for="userPwConfirm">새 비밀번호 확인</label>
                        <input type="password" id="userPwConfirm" class="form-control" placeholder="비밀번호 재입력">
                    </div>
                </div>
            </div>

            <!-- 플레이어 성향 및 상세 정보 섹션 -->
            <div class="form-section">
                <div class="form-section-title">플레이어 상세 정보</div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>성별</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="gender" value="male" checked required> 남성
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="gender" value="female"> 여성
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>주사용 손 (주손)</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="dominantHand" value="right" checked required> 오른손
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="dominantHand" value="left"> 왼손
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="dominantHand" value="both"> 양손
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="ageGroup">나이대</label>
                        <select id="ageGroup" class="form-control" required>
                            <option value="">선택해주세요</option>
                            <option value="10">10대</option>
                            <option value="20" selected>20대</option>
                            <option value="30">30대</option>
                            <option value="40">40대</option>
                            <option value="50">50대 이상</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="level">자체 급수 (선택사항)</label>
                        <select id="level" class="form-control">
                            <option value="beginner">입문 (초심)</option>
                            <option value="D" selected>D조</option>
                            <option value="C">C조</option>
                            <option value="B">B조</option>
                            <option value="A">A조 (준자강)</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="region">주 활동 지역</label>
                        <input type="text" id="region" class="form-control" value="서울시 강남구" required>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn btn-secondary" onclick="history.back();">취소</button>
                <button type="submit" class="btn btn-primary">변경사항 저장</button>
            </div>

        </form>
    </div>

</body>

</html>
